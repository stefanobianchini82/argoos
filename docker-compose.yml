services:
  # ─── Server ────────────────────────────────────────────────────────────────

  app:
    image: ghcr.io/stefanobianchini82/argoos-server:latest
    container_name: argoos-server
    restart: unless-stopped
    volumes:
      - public_assets:/var/www/html/public
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      DASHBOARD_USER: "${DASHBOARD_USER}"
      DASHBOARD_PASSWORD: "${DASHBOARD_PASSWORD}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: argoos-nginx
    restart: unless-stopped
    volumes:
      - ./server/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - public_assets:/var/www/html/public:ro
    depends_on:
      - app
    environment:
      VIRTUAL_HOST: "argoos.simplenetworks.it"
      LETSENCRYPT_HOST: "argoos.simplenetworks.it"
      LETSENCRYPT_EMAIL: dev@simplenetworks.it

  mysql:
    image: mysql:8.0
    container_name: argoos-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: argoos-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  horizon:
    image: ghcr.io/stefanobianchini82/argoos-server:latest
    container_name: argoos-horizon
    restart: unless-stopped
    command: php artisan horizon
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    image: ghcr.io/stefanobianchini82/argoos-server:latest
    container_name: argoos-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      APP_ENV: "${APP_ENV:-production}"
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  mysql_data:
  redis_data:
  public_assets:

networks:
  default:
    name: nginx-proxy
    external: true
